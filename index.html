<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta content="width=device-width,initial-scale=1" name="viewport">
    <title>WebAudio Listening Test</title>
    <meta name="description" content="A configurable web-based listening test platform for audio research.">
    <link href="main.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
    <script src="AudioPlayer.js"></script>
    <script src="SimilarityTest.js"></script>
    <script src="AbxTest.js"></script>
    <script src="AbxyTest.js"></script>
</head>

<body>
    <header>
        <ol id="steps" aria-label="Test progress">
            <li></li>
            <li></li>
            <li></li>
        </ol>
        <div id="progress" role="progressbar" aria-valuemin="0" aria-valuemax="100"></div>
    </header>
    <main>
        <form>
            <div class="form-step active" id="step-intro">
                <section id="intro">
                    <h1 id="main-title"></h1>
                    <h2 id="intro-title"></h2>
                    <div id="intro-text"></div>
                </section>
            </div>
            <div class="form-step" id="step-familiarization">
                <section id="intro">
                    <h2 id="fam-title"></h2>
                    <p id="fam-text"></p>
                </section>
                <div class="audios" id="fam-audios">
                    <!-- Populated from config -->
                </div>
            </div>

            <div class="form-step" id="step-conclusion">
                <section id="conclu">
                    <button id="save-btn" type="button"></button>
                    <p id="conclu-text"></p>
                </section>
            </div>
        </form>
    </main>

    <footer>
        <button id="prev" aria-label="Previous step">‹</button>
        <button id="next" aria-label="Next step">›</button>
    </footer>

    <script src="main.js"></script>
</body>

</html>
